<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>WhaleWatch</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}body{background:#080c10;color:#e0eaf0;font-family:monospace;min-height:100vh}
.hdr{padding:10px 16px;border-bottom:1px solid #1a2530;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:6px}
.logo{font-size:20px;font-weight:bold;color:#00e5ff;letter-spacing:3px}.logo span{color:#ff6b35}
.hdr-r{display:flex;align-items:center;gap:8px;font-size:10px;color:#4a6070}
.dot{width:7px;height:7px;border-radius:50%;background:#4a6070}.dot.live{background:#39ff14;animation:p 2s infinite}
@keyframes p{0%,100%{opacity:1}50%{opacity:.4}}
.nc{background:#ff6b35;color:#080c10;font-size:10px;font-weight:bold;padding:2px 8px;border-radius:8px;display:none}
.sum{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:#1a2530;border-bottom:1px solid #1a2530}
.sc{background:#0a0e14;padding:8px 12px}.sl{font-size:7px;color:#4a6070;letter-spacing:1.5px;text-transform:uppercase}.sv{font-size:14px;font-weight:bold;color:#00e5ff;margin-top:1px}.ss{font-size:7px;color:#4a6070;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tabs{display:flex;border-bottom:1px solid #1a2530;overflow-x:auto}.tab{padding:8px 12px;text-align:center;font-size:9px;letter-spacing:1px;cursor:pointer;color:#4a6070;border-bottom:2px solid transparent;white-space:nowrap}.tab:hover{color:#e0eaf0}.tab.active{color:#00e5ff;border-bottom-color:#00e5ff}
.badge{background:#ff6b35;color:#080c10;font-size:7px;font-weight:bold;padding:1px 3px;border-radius:2px;margin-left:3px}
.fb{padding:8px 16px;border-bottom:1px solid #1a2530;display:flex;align-items:center;gap:12px;background:#0a0e14;flex-wrap:wrap}
.fbl{font-size:8px;color:#4a6070;letter-spacing:1px}.fbv{font-size:16px;font-weight:bold;color:#00e5ff;min-width:60px}
input[type=range]{-webkit-appearance:none;width:180px;height:4px;background:#1a2530;border-radius:3px;outline:none;cursor:pointer}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:#00e5ff;cursor:pointer;border:2px solid #080c10}
.fbi{font-size:9px;color:#4a6070}
.panel{display:none}.panel.active{display:block}.section{max-height:80vh;overflow-y:auto;padding:10px 14px}
.empty{padding:30px;text-align:center;color:#4a6070;font-size:11px}
.spin{display:inline-block;width:9px;height:9px;border:2px solid #1a2530;border-top-color:#00e5ff;border-radius:50%;animation:sp .6s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
@keyframes flashIn{0%{background:rgba(0,229,255,.12);transform:translateX(-3px)}100%{background:transparent;transform:translateX(0)}}
.nb{background:#39ff14;color:#080c10;font-size:7px;font-weight:bold;padding:1px 3px;border-radius:2px;margin-left:3px}
/* MARKET CARD */
.mc{background:#0e1318;border:1px solid #1a2530;margin-bottom:8px;padding:10px 12px;cursor:pointer;transition:.15s}
.mc:hover{border-color:#253540}
.mc-h{display:flex;justify-content:space-between;align-items:center;gap:6px}
.mc-l{font-size:12px;font-weight:bold;color:#e0eaf0}.mc-o{font-size:18px;font-weight:bold;color:#39ff14}
.mc-m{font-size:9px;color:#4a6070;display:flex;gap:8px;flex-wrap:wrap;margin-top:3px}
.mc-ev{font-size:8px;color:#253540;margin-top:2px}
.mc-w{background:rgba(0,229,255,.1);color:#00e5ff;font-size:7px;padding:1px 4px;border-radius:2px}
.mc-t{border-top:1px solid #1a2530;margin-top:6px;padding-top:6px;display:none}.mc-t.open{display:block}
/* TRADE ROW */
.tr{display:grid;grid-template-columns:20px 1fr auto;gap:5px;padding:4px 0;border-bottom:1px solid #0a0e14;font-size:10px;align-items:center}.tr:last-child{border-bottom:none}
.tf{font-size:12px;text-align:center}.td{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:#e0eaf0;font-size:9px}
.tw{color:#4a6070;font-size:8px}.buy{color:#39ff14}.sell{color:#ff3366}
.ta{text-align:right;white-space:nowrap;font-weight:bold}.ta.b{color:#00e5ff}.ta.h{color:#ff3366}.ta.r{color:#e0eaf0}
.ts{font-size:7px;color:#4a6070}
/* SHARP BOX */
.sb{background:rgba(0,229,255,.05);border:1px solid #00e5ff;border-left:3px solid #00e5ff;padding:8px 12px;margin-bottom:10px}
.sb-t{font-size:9px;color:#00e5ff;letter-spacing:2px;font-weight:bold;margin-bottom:4px}
.sb-r{display:flex;justify-content:space-between;font-size:10px;padding:2px 0}
/* TRENDING */
.trend{background:rgba(255,107,53,.06);border:1px solid #ff6b35;border-left:3px solid #ff6b35;padding:8px 12px;margin-bottom:10px}
.trend-t{font-size:9px;color:#ff6b35;letter-spacing:2px;font-weight:bold;margin-bottom:4px}
/* WHALE CARD */
.wc{background:#0e1318;border:1px solid #1a2530;margin-bottom:6px;padding:10px 12px;display:grid;grid-template-columns:24px 1fr auto;gap:8px;align-items:center}
.wc:hover{border-color:#253540}.wc.mil{border-left:3px solid #ff0080;background:rgba(255,0,128,.03)}.wc.big{border-left:3px solid #00e5ff}.wc.long{border-left:3px solid #ff6b35}
.wf{font-size:14px;text-align:center}.wt{font-size:11px;font-weight:bold;line-height:1.3;margin-bottom:2px}.wm{font-size:9px;color:#4a6070;display:flex;gap:6px;flex-wrap:wrap}
.wr{text-align:right}.wa{font-size:16px;font-weight:bold}.wa.mil{color:#ff0080}.wa.big{color:#00e5ff}.wa.reg{color:#e0eaf0}.wo{font-size:9px;color:#4a6070}
/* BREAKDOWN */
.bd{font-size:9px;color:#4a6070;display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px}
/* WALLET */
.wlc{background:#0e1318;border:1px solid #1a2530;margin-bottom:8px;padding:10px 12px}
.wl-h{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.wl-n{font-size:12px;font-weight:bold;color:#e0eaf0}.wl-a{font-size:8px;color:#4a6070}.wl-v{font-size:16px;font-weight:bold;color:#00e5ff}
.wl-s{display:flex;gap:12px;font-size:10px;color:#4a6070;margin-bottom:6px}.wl-s b{color:#e0eaf0}
.wl-b{border-top:1px solid #1a2530;padding-top:4px}.wl-bt{font-size:9px;color:#4a6070;padding:2px 0;display:flex;justify-content:space-between}
/* TODAY HDR */
.today-hdr{padding:8px 0;margin-bottom:8px;border-bottom:1px solid #1a2530}
.today-hdr b{font-size:13px;color:#00e5ff}.today-hdr span{font-size:10px;color:#4a6070;margin-left:8px}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:#080c10}::-webkit-scrollbar-thumb{background:#1a2530}
@media(max-width:600px){.sum{grid-template-columns:repeat(2,1fr)}.tabs{flex-wrap:nowrap}}
</style></head><body>
<div class="hdr">
  <div class="logo">WHALE<span>WATCH</span></div>
  <div class="hdr-r">
    <span class="nc" id="nc">0 NEW</span>
    <button id="force-btn" onclick="forceRefresh()" style="background:#00e5ff;border:none;color:#080c10;padding:4px 10px;cursor:pointer;font-family:monospace;font-size:9px;font-weight:bold;letter-spacing:1px;border-radius:2px;transition:.2s">⟳ REFRESH</button>
    <div class="dot" id="dot"></div>
    <span id="stale" style="font-size:8px;color:#4a6070"></span>
    <span id="cd" style="font-variant-numeric:tabular-nums;font-size:10px;color:#4a6070">30s</span>
  </div>
</div>
<div id="featured" style="display:none"></div>
<div class="sum">
  <div class="sc"><div class="sl">Today Volume</div><div class="sv" id="sv1">—</div><div class="ss" id="ss1">—</div></div>
  <div class="sc"><div class="sl">Biggest Bet</div><div class="sv" id="sv2">—</div><div class="ss" id="ss2">—</div></div>
  <div class="sc"><div class="sl">Top Market</div><div class="sv" id="sv3">—</div><div class="ss" id="ss3">—</div></div>
  <div class="sc"><div class="sl">Top Wallet</div><div class="sv" id="sv4">—</div><div class="ss" id="ss4">—</div></div>
</div>
<div class="tabs">
  <div class="tab active" onclick="go('mlb')">⚾ MLB <span class="badge" id="n-mlb"></span></div>
  <div class="tab" onclick="go('nhl')">🏒 NHL <span class="badge" id="n-nhl"></span></div>
  <div class="tab" onclick="go('nba')">🏀 NBA <span class="badge" id="n-nba"></span></div>
  <div class="tab" onclick="go('golf')">⛳ MASTERS <span class="badge" id="n-golf"></span></div>
  <div class="tab" onclick="go('ucl')">⚽ UCL <span class="badge" id="n-ucl"></span></div>
  <div class="tab" onclick="go('war')">🚨 WAR <span class="badge" id="n-war"></span></div>
  <div class="tab" onclick="go('whales')">🐳 ALL WHALES <span class="badge" id="n-whales"></span></div>
  <div class="tab" onclick="go('smart')">🏆 SMART MONEY <span class="badge" id="n-smart"></span></div>
</div>
<div class="fb">
  <div><div class="fbl">MIN TRADE</div><div class="fbv" id="mv">$1.0K</div></div>
  <input type="range" id="ms" min="1000" max="900000" step="1000" value="1000" oninput="onS(+this.value)">
  <div class="fbi" id="fi">—</div>
</div>
<div class="panel active" id="p-mlb"><div class="section" id="s-mlb"><div class="empty"><span class="spin"></span></div></div></div>
<div class="panel" id="p-nhl"><div class="section" id="s-nhl"><div class="empty"><span class="spin"></span></div></div></div>
<div class="panel" id="p-nba"><div class="section" id="s-nba"><div class="empty"><span class="spin"></span></div></div></div>
<div class="panel" id="p-golf"><div class="section" id="s-golf"><div class="empty"><span class="spin"></span></div></div></div>
<div class="panel" id="p-ucl"><div class="section" id="s-ucl"><div class="empty"><span class="spin"></span></div></div></div>
<div class="panel" id="p-war"><div class="section" id="s-war"><div class="empty"><span class="spin"></span></div></div></div>
<div class="panel" id="p-whales"><div class="section" id="s-whales"><div class="empty"><span class="spin"></span></div></div></div>
<div class="panel" id="p-smart"><div class="section" id="s-smart"><div class="empty"><span class="spin"></span></div></div></div>

<script>
const $=id=>document.getElementById(id);
const F=n=>n>=1e6?'$'+(n/1e6).toFixed(2)+'M':n>=1e3?'$'+(n/1e3).toFixed(1)+'K':'$'+Math.round(n);
const D=n=>'$'+Math.round(n).toLocaleString();
const E=s=>(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;');
const TABS=['mlb','nhl','nba','golf','ucl','war','whales','smart'];
let newCt=0,cd=30,lastRefreshMs=0;

function go(t){TABS.forEach((x,i)=>{$('p-'+x).classList.toggle('active',x===t);document.querySelectorAll('.tab')[i].classList.toggle('active',x===t);});}
function getMin(){return parseInt($('ms').value)||1000;}
function onS(v){$('mv').textContent=F(v);loadAll();}

// Countdown + stale display
setInterval(()=>{
  cd--;
  if(cd<=0){cd=30;refresh();}
  $('cd').textContent='Next: '+cd+'s';
  // Show staleness
  if(lastRefreshMs){
    const ago=Math.round((Date.now()-lastRefreshMs)/1000);
    $('stale').textContent=ago<5?'Just now':ago+'s ago';
    $('stale').style.color=ago>60?'#ff3366':ago>30?'#ff6b35':'#4a6070';
  }
},1000);

function bumpNew(n){newCt+=n;const e=$('nc');if(newCt>0){e.textContent=newCt+' NEW';e.style.display='';}else e.style.display='none';}

async function forceRefresh(){
  const btn=$('force-btn');
  btn.textContent='⟳ FETCHING...';btn.style.background='#ff6b35';
  try{
    await fetch('/api/force-refresh');
    await refresh();
    btn.style.background='#39ff14';btn.textContent='✓ DONE';
    setTimeout(()=>{btn.style.background='#00e5ff';btn.textContent='⟳ REFRESH';},1500);
  }catch(e){
    btn.style.background='#ff3366';btn.textContent='✗ ERROR';
    setTimeout(()=>{btn.style.background='#00e5ff';btn.textContent='⟳ REFRESH';},2000);
  }
}

// Shared trade row renderer
function TR(t){
  const ac=t.usd>=50000?'h':t.usd>=5000?'b':'r';
  const ts=t.timestamp?new Date(t.timestamp*1000).toLocaleTimeString():'';
  const pay=t.payout>0?' · +'+F(t.payout):'';
  const con=t.consolidated>1?` <span style="color:#ff6b35">(${t.consolidated} bets)</span>`:'';
  const name=E(t.pseudonym||t.wallet);
  return`<div class="tr"><span class="tf">${t.flag||'·'}</span><div><div class="td"><span class="${t.side==='BUY'?'buy':'sell'}">${t.side}</span> ${E(t.outcome)} ${name} ${D(t.usd)} at ${(t.odds*100).toFixed(0)}¢${pay}${con}</div><div class="tw">${E(t.title).slice(0,40)} · ${ts}</div></div><div><div class="ta ${ac}">${F(t.usd)}</div><div class="ts">@${(t.odds*100).toFixed(0)}¢</div></div></div>`;
}

async function refresh(){
  $('dot').classList.remove('live');
  lastRefreshMs=Date.now();
  await Promise.allSettled([loadFeatured(),loadSummary(),loadMLB(),...['nhl','nba','golf','ucl','war'].map(loadSport),loadWhales(),loadSmart()]);
  $('dot').classList.add('live');cd=30;
}
function loadAll(){loadMLB();['nhl','nba','golf','ucl','war'].forEach(loadSport);loadWhales();}

// ── FEATURED MATCH ──
async function loadFeatured(){
  try{
    const d=await(await fetch(`/api/featured?_=${Date.now()}`)).json();
    const el=$('featured');
    if(!d.found){el.style.display='none';return;}
    el.style.display='block';

    const s=d.sinner||{}, a=d.alcaraz||{};
    const sp=(s.yesPrice*100).toFixed(1), ap=(a.yesPrice*100).toFixed(1);
    const sd=s.delta, ad=a.delta;
    const sdStr=sd?` <span style="color:${sd>0?'#39ff14':'#ff3366'}">${sd>0?'▲':'▼'}${Math.abs(sd*100).toFixed(1)}pp</span>`:'';
    const adStr=ad?` <span style="color:${ad>0?'#39ff14':'#ff3366'}">${ad>0?'▲':'▼'}${Math.abs(ad*100).toFixed(1)}pp</span>`:'';

    // Verdict color
    const vc=d.verdict.includes('SINNER')?'#00e5ff':d.verdict.includes('ALCARAZ')?'#ff6b35':'#4a6070';

    function featTR(t){
      const ac=t.usd>=50000?'h':t.usd>=10000?'b':'r';
      const name=E(t.pseudonym||t.wallet);
      const pay=t.payout>0?` — potential win: ${F(t.payout)}`:'';
      const con=t.consolidated>1?` <span style="color:#ff6b35">(${t.consolidated} bets)</span>`:'';
      const ts=t.timestamp?new Date(t.timestamp*1000).toLocaleTimeString():'';
      return`<div style="display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid #1a2530;font-size:10px"><div style="flex:1"><span>${t.flag||'·'}</span> <span class="${t.side==='BUY'?'buy':'sell'}">${t.side}</span> <b>${E(t.outcome)}</b> at ${(t.odds*100).toFixed(0)}¢ — <b style="color:#00e5ff">${D(t.usd)}</b> — ${name}${pay}${con}</div><div style="text-align:right;min-width:55px"><b class="ta ${ac}">${F(t.usd)}</b><div style="font-size:7px;color:#4a6070">${ts}</div></div></div>`;
    }

    const sinnerTrades=s.trades||[], alcarazTrades=a.trades||[];

    el.innerHTML=`<div style="background:linear-gradient(135deg,#0a1020,#0e1318);border:2px solid #ffd700;margin:0;padding:14px 18px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;flex-wrap:wrap;gap:6px">
        <div><span style="font-size:16px">🎾</span> <span style="font-size:14px;font-weight:bold;color:#ffd700;letter-spacing:2px">FEATURED MATCH</span><div style="font-size:10px;color:#4a6070;margin-top:2px">${E(d.eventTitle)} — Monte Carlo Masters Final</div></div>
        <div style="text-align:right"><div style="font-size:10px;color:#4a6070">Total Vol: ${F(d.totalVolume)} · 24h: ${F(d.totalVol24)}</div></div>
      </div>

      <div style="display:grid;grid-template-columns:1fr auto 1fr;gap:10px;align-items:center;margin-bottom:12px">
        <div style="text-align:center"><div style="font-size:20px;font-weight:bold;color:#00e5ff">${E('Jannik Sinner')}</div><div style="font-size:28px;font-weight:bold;color:#39ff14">${sp}%${sdStr}</div><div style="font-size:9px;color:#4a6070">${s.wallets||0} wallets · ${F(s.totalVol||0)} vol</div></div>
        <div style="font-size:12px;color:#4a6070;font-weight:bold">VS</div>
        <div style="text-align:center"><div style="font-size:20px;font-weight:bold;color:#ff6b35">${E('Carlos Alcaraz')}</div><div style="font-size:28px;font-weight:bold;color:#39ff14">${ap}%${adStr}</div><div style="font-size:9px;color:#4a6070">${a.wallets||0} wallets · ${F(a.totalVol||0)} vol</div></div>
      </div>

      <div style="display:flex;height:20px;border-radius:3px;overflow:hidden;margin-bottom:10px"><div style="width:${sp}%;background:rgba(0,229,255,.25);display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:bold;color:#00e5ff">Sinner ${sp}%</div><div style="width:${ap}%;background:rgba(255,107,53,.25);display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:bold;color:#ff6b35">Alcaraz ${ap}%</div></div>

      <div style="text-align:center;padding:6px;background:rgba(255,215,0,.08);border:1px solid #ffd700;border-radius:3px;margin-bottom:10px"><span style="font-size:11px;font-weight:bold;color:${vc}">🧠 ${E(d.verdict)}</span></div>

      ${sinnerTrades.length?`<div style="margin-bottom:8px"><div style="font-size:9px;color:#00e5ff;letter-spacing:1px;font-weight:bold;margin-bottom:4px">SINNER TRADES (${sinnerTrades.length})</div>${sinnerTrades.map(featTR).join('')}</div>`:''}
      ${alcarazTrades.length?`<div><div style="font-size:9px;color:#ff6b35;letter-spacing:1px;font-weight:bold;margin-bottom:4px">ALCARAZ TRADES (${alcarazTrades.length})</div>${alcarazTrades.map(featTR).join('')}</div>`:''}
      ${(d.otherTrades||[]).length?`<div style="margin-top:8px"><div style="font-size:9px;color:#ffd700;letter-spacing:1px;font-weight:bold;margin-bottom:4px">O/U + PROPS TRADES (${d.otherTrades.length})</div>${d.otherTrades.map(featTR).join('')}</div>`:''}
      ${(d.extraMarkets||[]).length?`<div style="margin-top:8px;border-top:1px solid #1a2530;padding-top:6px"><div style="font-size:9px;color:#4a6070;letter-spacing:1px;margin-bottom:4px">MATCH PROPS</div>${d.extraMarkets.map(m=>`<div style="display:flex;justify-content:space-between;font-size:9px;padding:2px 0;border-bottom:1px solid #0a0e14"><span style="color:#e0eaf0">${E(m.question).slice(0,50)}</span><span style="color:#39ff14;font-weight:bold">${(m.prices[0]*100).toFixed(0)}% / ${(m.prices[1]*100).toFixed(0)}%</span><span style="color:#4a6070">${F(m.volume)}</span></div>`).join('')}</div>`:''}
      ${!sinnerTrades.length&&!alcarazTrades.length&&!(d.otherTrades||[]).length?'<div style="font-size:10px;color:#4a6070;text-align:center;padding:8px">No whale trades yet — watching for $1K+ bets</div>':''}
    </div>`;
  }catch(e){$('featured').style.display='none';}
}

// ── SUMMARY ──
async function loadSummary(){
  try{
    const s=await(await fetch('/api/summary')).json();
    $('sv1').textContent=F(s.totalVolume||0);$('ss1').textContent=`${(s.tradeCount||0).toLocaleString()} trades`;
    if(s.biggestTrade){$('sv2').textContent=F(s.biggestTrade.usd);$('ss2').textContent=s.biggestTrade.wallet+' · '+s.biggestTrade.title;}
    if(s.topMarket){$('sv3').textContent=F(s.topMarket.volume);$('ss3').textContent=s.topMarket.title;}
    if(s.topWallet){$('sv4').textContent=F(s.topWallet.volume);$('ss4').textContent=s.topWallet.address;}
  }catch(e){}
}

// ── MLB (game-structured) ──
function mlbTR(t, icon){
  const ac=t.usd>=50000?'h':t.usd>=5000?'b':'r';
  const name=E(t.pseudonym||t.wallet);
  const pay=t.payout>0?` — potential win: ${F(t.payout)}`:'';
  const con=t.consolidated>1?` <span style="color:#ff6b35">(${t.consolidated} bets)</span>`:'';
  const ts=t.timestamp?new Date(t.timestamp*1000).toLocaleTimeString():'';
  return`<div style="padding:4px 0;border-bottom:1px solid #0a0e14;font-size:10px;display:flex;justify-content:space-between;align-items:center"><div style="flex:1;overflow:hidden"><span>${icon||t.flag||'·'}</span> <span class="${t.side==='BUY'?'buy':'sell'}">${t.side}</span> <b>${E(t.outcome)}</b> at ${(t.odds*100).toFixed(0)}¢ — <b style="color:#00e5ff">${D(t.usd)}</b> — ${name}${pay}${con} <span style="color:#4a6070;font-size:8px">${ts}</span></div><div style="text-align:right;min-width:55px"><b class="ta ${ac}">${F(t.usd)}</b></div></div>`;
}

async function loadMLB(){
  const el=$('s-mlb'); if(!el) return;
  try{
    const min=getMin();
    const d=await(await fetch(`/api/mlb?min=${min}`)).json();
    if(d.error)throw new Error(d.error);
    const games=d.games||[];
    $('n-mlb').textContent=games.length;
    $('fi').textContent=`${(d.todayCount||0).toLocaleString()} today · ${(d.stored||0).toLocaleString()} stored`;
    if(!games.length){el.innerHTML='<div class="empty">No MLB games today</div>';return;}

    el.innerHTML=games.map((g,i)=>{
      const time=new Date(g.gameTime).toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',timeZone:'America/New_York'})+' ET';
      const ml=g.moneyline;
      let mlBar='';
      if(ml&&ml.prices.length>=2){
        const a=(ml.prices[0]*100).toFixed(1),h=(ml.prices[1]*100).toFixed(1);
        mlBar=`<div style="display:flex;height:16px;border-radius:2px;overflow:hidden;margin:4px 0"><div style="width:${a}%;background:rgba(0,229,255,.2);color:#00e5ff;font-size:9px;font-weight:bold;display:flex;align-items:center;padding:0 6px">${a}%</div><div style="width:${h}%;background:rgba(255,107,53,.2);color:#ff6b35;font-size:9px;font-weight:bold;display:flex;align-items:center;justify-content:flex-end;padding:0 6px">${h}%</div></div>`;
      }
      const ouLine=g.ou?`<div style="font-size:10px;color:#4a6070;margin-top:2px">O/U <b style="color:#e0eaf0">${g.ou.line}</b> — Over ${(g.ou.prices[0]*100).toFixed(0)}% / Under ${(g.ou.prices[1]*100).toFixed(0)}%</div>`:'';
      const hotBadge=g.hot?'<span style="background:rgba(255,107,53,.15);color:#ff6b35;font-size:8px;padding:1px 5px;border-radius:2px;margin-left:6px">🔥 HOT</span>':'';
      const whaleVol=g.totalWhaleVol>0?`<span style="font-size:9px;color:#00e5ff">Total whale action: ${F(g.totalWhaleVol)}</span>`:'';

      // ML trades section
      let mlSection='';
      if(g.mlTrades.length){
        mlSection=`<div style="margin-top:6px"><div style="font-size:8px;color:#4a6070;letter-spacing:1px;margin-bottom:3px">MONEYLINE TRADES (${g.mlTrades.length})</div>${g.mlTrades.map(t=>mlbTR(t,'🎲')).join('')}</div>`;
      }

      // O/U trades section
      let ouSection='';
      if(g.ouTrades.length){
        ouSection=`<div style="margin-top:6px"><div style="font-size:8px;color:#4a6070;letter-spacing:1px;margin-bottom:3px">OVER/UNDER TRADES (${g.ouTrades.length})</div>${g.ouTrades.map(t=>{
          const icon=t.outcome&&t.outcome.toLowerCase().includes('over')?'⬆️':'⬇️';
          return mlbTR(t,icon);
        }).join('')}</div>`;
      }

      // Other trades (spread, first inning, etc)
      let otherSection='';
      if(g.otherTrades.length){
        otherSection=`<div style="margin-top:6px"><div style="font-size:8px;color:#4a6070;letter-spacing:1px;margin-bottom:3px">OTHER PROPS (${g.otherTrades.length})</div>${g.otherTrades.map(t=>mlbTR(t,'📊')).join('')}</div>`;
      }

      const noActivity=!g.mlTrades.length&&!g.ouTrades.length&&!g.otherTrades.length?`<div style="font-size:10px;color:#253540;padding:8px 0;text-align:center">No whale activity yet — trades under ${F(min)} not shown</div>`:'';

      return`<div class="mc" style="cursor:default;padding:12px 14px">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px">
          <div>
            <div style="font-size:14px;font-weight:bold;color:#e0eaf0">${E(g.away)} <span style="color:#4a6070">@</span> ${E(g.home)}${hotBadge}</div>
            <div style="font-size:9px;color:#4a6070;margin-top:2px">${E(g.awayRec)} vs ${E(g.homeRec)} · ${time} · ${E(g.status)}</div>
            <div style="font-size:10px;color:#4a6070;margin-top:3px">⚾ <b style="color:#e0eaf0">${E(g.awayPitcher)}</b> vs <b style="color:#e0eaf0">${E(g.homePitcher)}</b></div>
          </div>
          <div style="text-align:right">${whaleVol}<div style="font-size:9px;color:#4a6070">${g.tradeCount} trades</div></div>
        </div>
        ${mlBar}${ouLine}
        ${mlSection}${ouSection}${otherSection}${noActivity}
      </div>`;
    }).join('');
  }catch(e){el.innerHTML=`<div class="empty">Error: ${E(e.message)}</div>`;}
}

// ── UNIFIED SPORT TAB LOADER ──
async function loadSport(cat){
  const el=$('s-'+cat); if(!el)return;
  try{
    const min=getMin();
    const d=await(await fetch(`/api/sport/${cat}?min=${min}`)).json();
    if(d.error)throw new Error(d.error);
    const markets=d.markets||[];
    const sharp=d.sharpLabels||[];
    const nEl=$('n-'+cat); if(nEl) nEl.textContent=markets.filter(m=>m.trades.length>0).length||markets.length;
    $('fi').textContent=`${(d.todayCount||0).toLocaleString()} today · ${(d.stored||0).toLocaleString()} stored`;

    let html='';

    // MLB schedule header
    if(cat==='mlb'&&d.schedule){
      html+=d.schedule.map(g=>{
        const a=g.teams.away.team.name,h=g.teams.home.team.name;
        const ap=(g.teams.away.probablePitcher||{}).fullName||'TBD';
        const hp=(g.teams.home.probablePitcher||{}).fullName||'TBD';
        const status=g.status.detailedState;
        const time=new Date(g.gameDate).toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',timeZone:'America/New_York'})+' ET';
        return`<div style="font-size:10px;color:#4a6070;padding:4px 0;border-bottom:1px solid #0a0e14"><b style="color:#e0eaf0">${E(a)}</b> @ <b style="color:#e0eaf0">${E(h)}</b> · ${time} · ${E(status)} · ⚾ ${E(ap)} vs ${E(hp)}</div>`;
      }).join('')+'<div style="height:8px"></div>';
    }

    // Sharp consensus
    if(sharp.length) html+=`<div class="sb"><div class="sb-t">🧠 SHARP CONSENSUS — 3+ WALLETS</div>${sharp.map(s=>`<div class="sb-r"><span style="color:#e0eaf0;font-weight:bold">${E(s.label)}</span><span style="color:#00e5ff">${s.wallets} wallets</span></div>`).join('')}</div>`;

    // Market cards
    if(!markets.length){html+='<div class="empty">No markets found</div>';}
    else html+=markets.slice(0,60).map((m,i)=>{
      const pct=(m.yesPrice*100).toFixed(1);
      const tc=m.trades.length;
      const mid=cat+'-m-'+i;
      const wb=m.uniqueWallets>=3?`<span class="mc-w">🧠 ${m.uniqueWallets}w</span>`:'';
      const thtml=tc?`<div class="mc-t" id="${mid}">${m.trades.map(t=>TR(t)).join('')}</div>`:'';
      return`<div class="mc" onclick="var e=$('${mid}');if(e)e.classList.toggle('open')"><div class="mc-h"><div class="mc-l">${E(m.label)}</div><div class="mc-o">${pct}%</div></div><div class="mc-m"><span>Vol: ${F(m.volume)}</span>${m.volume24hr>0?`<span>24h: ${F(m.volume24hr)}</span>`:''} ${tc?`<span style="color:#ff6b35">${tc} trades</span>`:''} ${wb}</div><div class="mc-ev">${E(m.event)}</div>${thtml}${tc?`<div style="font-size:8px;color:#4a6070;margin-top:3px">▼ ${tc} trades</div>`:''}</div>`;
    }).join('');

    el.innerHTML=html;
  }catch(e){el.innerHTML=`<div class="empty">Error: ${E(e.message)}</div>`;}
}

// ── ALL WHALES (incremental prepend) ──
const seen=new Set();
let whalesFirstLoad=true;

function whaleCard(t, isNew){
  const cls=t.usd>=1e6?'mil':t.usd>=50000?'big':t.odds<=0.20?'long':'';
  const ac=t.usd>=1e6?'mil':t.usd>=50000?'big':'reg';
  const ts=t.timestamp?new Date(t.timestamp*1000).toLocaleTimeString():'';
  const pay=t.payout>0?`<span style="color:#ffd700;font-size:9px">+${F(t.payout)}</span>`:'';
  const icon=t.sportIcon||'';
  const con=t.consolidated>1?` <span style="color:#ff6b35;font-size:8px">(${t.consolidated} bets)</span>`:'';
  const anim=isNew?' style="animation:flashIn 1.5s"':'';
  const badge=isNew?'<span class="nb" style="background:#39ff14;color:#080c10;font-size:7px;padding:1px 4px;border-radius:2px;margin-left:3px">🆕 NEW</span>':'';
  return`<div class="wc ${cls}" data-wid="${E(t.id)}"${anim}><div class="wf">${t.flag||icon||'·'}</div><div><div class="wt">${icon} ${E(t.title).slice(0,58)}${badge}${con}</div><div class="wm"><span class="${t.side==='BUY'?'buy':'sell'}">${t.side}</span><span>${E(t.outcome)}</span><span>${E(t.pseudonym||t.wallet)}</span><span>${D(t.usd)} at ${(t.odds*100).toFixed(0)}¢</span><span>${ts}</span>${pay}</div></div><div class="wr"><div class="wa ${ac}">${F(t.usd)}</div><div class="wo">@${(t.odds*100).toFixed(0)}¢</div></div></div>`;
}

async function loadWhales(){
  try{
    const min=getMin();
    // Cache-bust with timestamp
    const d=await(await fetch(`/api/allwhales?min=${min}&_=${Date.now()}`)).json();
    if(d.error)throw new Error(d.error);
    const trades=d.trades||[];
    const trending=d.trending||[];
    const bd=d.breakdown||{};
    $('n-whales').textContent=trades.length;

    // Update staleness from server data
    const fetchAge=d.lastFetchTime?Math.round((Date.now()-d.lastFetchTime)/1000):0;
    const newestAge=d.newestTradeTs?Math.round(Date.now()/1000-d.newestTradeTs):0;
    $('fi').textContent=`${(d.todayCount||0).toLocaleString()} today · fetched ${fetchAge}s ago · newest trade ${newestAge}s ago`;

    const el=$('s-whales');

    // Find new trades not seen yet
    const newOnes=trades.filter(t=>t.id&&!seen.has(t.id));

    // FIRST LOAD: build everything
    if(whalesFirstLoad || !el.querySelector('[data-wid]')){
      whalesFirstLoad=false;
      trades.forEach(t=>seen.add(t.id));

      const bdStr=Object.entries(bd).sort((a,b)=>b[1].count-a[1].count).map(([k,v])=>{
        const icons={MLB:'⚾',NHL:'🏒',NBA:'🏀',Soccer:'⚽',Golf:'⛳',War:'🚨',Crypto:'₿',Other:'📊'};
        return`<span>${icons[k]||''} ${k}: <b style="color:#e0eaf0">${v.count}</b></span>`;
      }).join('');

      let hdr=`<div id="wh-hdr" class="today-hdr"><b>Today's Feed</b><span>${E(d.todayDate||'')}</span><span>${(d.todayCount||0).toLocaleString()} trades · ${trades.length} shown >= ${F(min)}</span></div><div id="wh-bd" class="bd">${bdStr}</div>`;
      if(trending.length) hdr+=`<div id="wh-trend" class="trend"><div class="trend-t">🔥 TRENDING — LAST HOUR</div>${trending.map(t=>`<div class="sb-r"><span style="color:#e0eaf0;font-weight:bold">${t.icon} ${E(t.title).slice(0,40)}</span><span style="color:#ff6b35">${t.wallets}w · ${t.trades}t · ${F(t.volume)}</span></div>`).join('')}</div>`;
      hdr+=`<div id="wh-feed"></div>`;
      el.innerHTML=hdr;

      const feed=$('wh-feed');
      if(!trades.length){feed.innerHTML=`<div class="empty">No trades >= ${F(min)} today</div>`;return;}
      feed.innerHTML=trades.map(t=>whaleCard(t,false)).join('');
      return;
    }

    // SUBSEQUENT LOADS: update header, prepend new trades
    // Update header stats (don't rebuild the whole feed)
    const hdrEl=$('wh-hdr');
    if(hdrEl) hdrEl.innerHTML=`<b>Today's Feed</b><span>${E(d.todayDate||'')}</span><span>${(d.todayCount||0).toLocaleString()} trades · ${trades.length} shown >= ${F(min)}</span>`;

    // Update breakdown
    const bdEl=$('wh-bd');
    if(bdEl){
      const bdStr=Object.entries(bd).sort((a,b)=>b[1].count-a[1].count).map(([k,v])=>{
        const icons={MLB:'⚾',NHL:'🏒',NBA:'🏀',Soccer:'⚽',Golf:'⛳',War:'🚨',Crypto:'₿',Other:'📊'};
        return`<span>${icons[k]||''} ${k}: <b style="color:#e0eaf0">${v.count}</b></span>`;
      }).join('');
      bdEl.innerHTML=bdStr;
    }

    // Prepend NEW trades to feed (don't touch existing)
    if(newOnes.length>0){
      newOnes.forEach(t=>seen.add(t.id));
      bumpNew(newOnes.length);
      const feed=$('wh-feed');
      if(feed){
        const frag=document.createElement('div');
        frag.innerHTML=newOnes.map(t=>whaleCard(t,true)).join('');
        const first=feed.firstChild;
        while(frag.lastChild) feed.insertBefore(frag.lastChild, first);
        // Cap at 200
        while(feed.children.length>200) feed.removeChild(feed.lastChild);
      }
    }

    // Remove NEW badges after 2 min
    el.querySelectorAll('.nb').forEach(badge=>{
      const card=badge.closest('[data-wid]');
      if(!card)return;
      // Check if card has been in DOM > 2 min by checking if we've seen it for 2+ refreshes
      setTimeout(()=>badge.remove(), 120000);
    });

  }catch(e){if(whalesFirstLoad)$('s-whales').innerHTML=`<div class="empty">Error: ${E(e.message)}</div>`;}
}

// ── SMART MONEY ──
let smWatchlist=[];
async function loadSmart(){
  const el=$('s-smart'); if(!el)return;
  try{
    const d=await(await fetch('/api/smart-money')).json();
    if(d.error)throw new Error(d.error);
    const wallets=d.wallets||[];
    const lb=d.fullLeaderboard||[];
    smWatchlist=d.watchlist||[];
    $('n-smart').textContent=wallets.length;

    let html='';

    // Leaderboard summary
    if(lb.length){
      html+=`<div style="margin-bottom:12px"><div style="font-size:10px;color:#ffd700;letter-spacing:2px;font-weight:bold;margin-bottom:6px">🏆 SPORTS LEADERBOARD — TOP 25 BY PNL THIS MONTH</div>`;
      html+=lb.map((w,i)=>{
        const medals=['🥇','🥈','🥉'];
        const rc=i<3?'#ffd700':i<10?'#00e5ff':'#4a6070';
        return`<div style="display:flex;justify-content:space-between;align-items:center;padding:3px 0;border-bottom:1px solid #0a0e14;font-size:10px"><span style="color:${rc};min-width:28px">${medals[i]||'#'+(i+1)}</span><span style="color:#e0eaf0;font-weight:bold;flex:1">${E(w.pseudonym||w.short)}</span><span style="color:${w.pnl>=0?'#39ff14':'#ff3366'};font-weight:bold;min-width:80px;text-align:right">${w.pnl>=0?'+':''}${F(w.pnl)}</span><span style="color:#4a6070;min-width:70px;text-align:right">${F(w.vol)} vol</span></div>`;
      }).join('')+'</div>';
    }

    // Detailed wallet cards
    html+=wallets.map((w,i)=>{
      const onWL=smWatchlist.includes(w.address);
      const wlBtn=`<button onclick="event.stopPropagation();toggleWatch('${w.address}')" style="background:${onWL?'#ff6b35':'transparent'};border:1px solid ${onWL?'#ff6b35':'#4a6070'};color:${onWL?'#080c10':'#4a6070'};padding:2px 8px;cursor:pointer;font-family:monospace;font-size:8px;border-radius:2px">${onWL?'★ FOLLOWING':'☆ FOLLOW'}</button>`;
      const wr=w.winRate*100;
      const warn=w.lowSample?'<span style="color:#ff6b35;font-size:8px;margin-left:4px">⚠ low sample</span>':'';

      // Score display
      let scoreHtml=`<div style="display:flex;gap:12px;font-size:9px;color:#4a6070;margin:6px 0;flex-wrap:wrap"><span>Score: <b style="color:#ffd700">${w.finalScore.toFixed(0)}</b></span><span>PnL: <b style="color:${w.pnl>=0?'#39ff14':'#ff3366'}">${w.pnl>=0?'+':''}${F(w.pnl)}</b></span><span>Open PnL: <b style="color:${w.openCashPnl>=0?'#39ff14':'#ff3366'}">${w.openCashPnl>=0?'+':''}${F(w.openCashPnl)}</b></span><span>Win: <b style="color:#e0eaf0">${wr.toFixed(0)}%</b> (${w.settledCount} settled)${warn}</span><span>Vol: <b>${F(w.vol)}</b></span></div>`;

      // Open positions
      let posHtml='';
      if(w.openPositions.length){
        posHtml=`<div style="margin-top:6px"><div style="font-size:8px;color:#4a6070;letter-spacing:1px;margin-bottom:3px">OPEN POSITIONS (${w.openPositions.length})</div>${w.openPositions.map(p=>{
          const pnlColor=p.cashPnl>=0?'#39ff14':'#ff3366';
          const pnlSign=p.cashPnl>=0?'+':'';
          return`<div style="display:flex;justify-content:space-between;padding:3px 0;border-bottom:1px solid #0a0e14;font-size:9px"><span style="color:#e0eaf0;flex:1">${E(p.title)} · <b>${E(p.outcome)}</b></span><span style="color:#4a6070;margin:0 8px">size: ${F(p.size)} · avg: ${(p.avgPrice*100).toFixed(0)}¢ · now: ${(p.curPrice*100).toFixed(0)}¢</span><span style="color:${pnlColor};font-weight:bold;min-width:60px;text-align:right">${pnlSign}${F(p.cashPnl)}</span></div>`;
        }).join('')}</div>`;
      }

      // Recent trades
      let tradesHtml='';
      if(w.recentTrades.length){
        tradesHtml=`<div style="margin-top:6px"><div style="font-size:8px;color:#4a6070;letter-spacing:1px;margin-bottom:3px">RECENT TRADES (${w.recentTrades.length})</div>${w.recentTrades.map(t=>{
          const ts=t.timestamp?new Date(t.timestamp*1000).toLocaleTimeString():'';
          const vBadge=t.verified?'<span style="color:#39ff14;font-size:7px">✓</span>':'';
          return`<div style="display:flex;justify-content:space-between;padding:2px 0;border-bottom:1px solid #0a0e14;font-size:9px"><span><span class="${t.side==='BUY'?'buy':'sell'}">${t.side}</span> ${E(t.outcome)} · ${E(t.title)} ${vBadge}</span><span style="color:#4a6070">${D(t.usd)} @${(t.price*100).toFixed(0)}¢ · ${ts}</span></div>`;
        }).join('')}</div>`;
      }

      const medals=['🥇','🥈','🥉'];
      return`<div class="mc" style="cursor:default;padding:12px 14px;margin-bottom:10px"><div style="display:flex;justify-content:space-between;align-items:flex-start"><div><span style="font-size:14px;margin-right:4px">${medals[i]||(i+1)}</span><b style="font-size:13px;color:#e0eaf0">${E(w.pseudonym||w.short)}</b><div style="font-size:8px;color:#4a6070">${w.address.slice(0,10)}…${w.address.slice(-6)}</div></div><div style="text-align:right">${wlBtn}<div style="font-size:16px;font-weight:bold;color:${w.pnl>=0?'#39ff14':'#ff3366'};margin-top:2px">${w.pnl>=0?'+':''}${F(w.pnl)}</div></div></div>${scoreHtml}${posHtml}${tradesHtml}</div>`;
    }).join('');

    el.innerHTML=html||'<div class="empty">No smart money data</div>';
  }catch(e){el.innerHTML=`<div class="empty">Error: ${E(e.message)}</div>`;}
}

async function toggleWatch(addr){
  const action=smWatchlist.includes(addr)?'remove':'add';
  try{
    const r=await fetch('/api/watchlist',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({address:addr,action})});
    const d=await r.json();
    smWatchlist=d.watchlist||[];
    loadSmart();
  }catch(e){}
}
