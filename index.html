<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>WhaleWatch</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#080c10;color:#e0eaf0;font-family:monospace;min-height:100vh}
.hdr{padding:12px 20px;border-bottom:1px solid #1a2530;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
.logo{font-size:22px;font-weight:bold;color:#00e5ff;letter-spacing:3px}.logo span{color:#ff6b35}
.hdr-right{display:flex;align-items:center;gap:10px;font-size:10px;color:#4a6070}
.dot{width:7px;height:7px;border-radius:50%;background:#4a6070}.dot.live{background:#39ff14;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.tabs{display:flex;border-bottom:1px solid #1a2530}
.tab{flex:1;padding:10px;text-align:center;font-size:10px;letter-spacing:1.5px;cursor:pointer;color:#4a6070;border-bottom:2px solid transparent;transition:.15s}
.tab:hover{color:#e0eaf0}.tab.active{color:#00e5ff;border-bottom-color:#00e5ff}
.badge{background:#ff6b35;color:#080c10;font-size:8px;font-weight:bold;padding:1px 4px;border-radius:2px;margin-left:4px}
.filter-bar{padding:10px 20px;border-bottom:1px solid #1a2530;display:flex;align-items:center;gap:14px;background:#0a0e14;flex-wrap:wrap}
.fb-label{font-size:9px;color:#4a6070;letter-spacing:1.5px}
.fb-val{font-size:18px;font-weight:bold;color:#00e5ff;min-width:70px}
input[type=range]{-webkit-appearance:none;width:200px;height:5px;background:#1a2530;border-radius:3px;outline:none;cursor:pointer}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:#00e5ff;cursor:pointer;border:2px solid #080c10}
.fb-info{font-size:9px;color:#4a6070}
.panel{display:none}.panel.active{display:block}
.section{max-height:84vh;overflow-y:auto;padding:12px 16px}
.empty{padding:30px;text-align:center;color:#4a6070;font-size:11px}
.spin{display:inline-block;width:9px;height:9px;border:2px solid #1a2530;border-top-color:#00e5ff;border-radius:50%;animation:sp .6s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}

/* MLB */
.game{background:#0e1318;border:1px solid #1a2530;margin-bottom:10px;cursor:pointer;transition:.15s}
.game:hover{border-color:#253540}
.game-top{padding:12px 14px}
.game-teams{font-size:13px;font-weight:bold}.game-sub{font-size:9px;color:#4a6070;margin-top:2px}
.pitchers{font-size:10px;color:#4a6070;margin-top:4px}.pitchers b{color:#e0eaf0}
.ml-bar{display:flex;height:18px;border-radius:2px;overflow:hidden;margin:6px 0 4px}
.ml-a{background:rgba(0,229,255,.2);color:#00e5ff;font-size:9px;font-weight:bold;display:flex;align-items:center;padding:0 6px;transition:width .4s}
.ml-h{background:rgba(255,107,53,.2);color:#ff6b35;font-size:9px;font-weight:bold;display:flex;align-items:center;justify-content:flex-end;padding:0 6px;transition:width .4s}
.game-meta{font-size:9px;color:#4a6070;display:flex;gap:8px;flex-wrap:wrap;margin-top:4px}
.sharp{background:rgba(255,51,102,.15);border:1px solid #ff3366;color:#ff3366;font-size:8px;padding:1px 5px;letter-spacing:1px;animation:pulse .8s infinite}
.misprice{background:rgba(255,215,0,.12);border:1px solid #ffd700;color:#ffd700;font-size:8px;padding:1px 5px;letter-spacing:1px}
.ou-pill{font-size:10px;color:#4a6070;margin-top:4px}.ou-pill b{color:#e0eaf0}
.game-trades{border-top:1px solid #1a2530;padding:8px 14px;display:none}
.game-trades.open{display:block}
.game-expand{font-size:9px;color:#4a6070;padding:2px 14px 8px;text-align:right}

/* TRADE ROW */
.tr{display:grid;grid-template-columns:22px 1fr auto;gap:6px;padding:5px 0;border-bottom:1px solid #0a0e14;font-size:10px;align-items:center}
.tr:last-child{border-bottom:none}
.tr-flag{font-size:13px;text-align:center}
.tr-detail{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:#e0eaf0;font-size:9px}
.tr-wallet{color:#4a6070;font-size:8px}
.buy{color:#39ff14}.sell{color:#ff3366}
.tr-right{text-align:right;white-space:nowrap}
.tr-amt{font-weight:bold}.tr-amt.big{color:#00e5ff}.tr-amt.huge{color:#ff3366}.tr-amt.reg{color:#e0eaf0}
.tr-sub{font-size:8px;color:#4a6070}

/* WHALE BANNER */
.whale-banner{background:rgba(255,51,102,.08);border:1px solid #ff3366;border-left:4px solid #ff3366;margin-bottom:12px;padding:10px 14px}
.wb-title{font-size:10px;color:#ff3366;letter-spacing:2px;margin-bottom:6px;font-weight:bold}

/* WAR */
.war-market{background:#0e1318;border:1px solid #1a2530;border-left:3px solid #ff3366;margin-bottom:10px;padding:12px 14px;cursor:pointer;transition:.15s}
.war-market:hover{border-color:#253540}
.war-market.mod{border-left-color:#ff6b35}.war-market.low{border-left-color:#4a6070}
.wm-hdr{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:6px}
.wm-q{font-size:12px;font-weight:bold;line-height:1.4;flex:1}
.wm-pct{font-size:22px;font-weight:bold}
.wm-pct.hi{color:#ff3366}.wm-pct.mod{color:#ff6b35}.wm-pct.lo{color:#39ff14}
.wm-meta{font-size:9px;color:#4a6070;display:flex;gap:10px;flex-wrap:wrap}
.wm-trades{border-top:1px solid #1a2530;margin-top:8px;padding-top:8px;display:none}
.wm-trades.open{display:block}

/* ALL WHALES */
.whale-trade{background:#0e1318;border:1px solid #1a2530;margin-bottom:8px;padding:12px 14px;display:grid;grid-template-columns:28px 1fr auto;gap:10px;align-items:center}
.whale-trade:hover{border-color:#253540}
.whale-trade.mil{border-left:3px solid #ff0080;background:rgba(255,0,128,.04)}
.whale-trade.big{border-left:3px solid #00e5ff}
.whale-trade.long{border-left:3px solid #ff6b35}
.wht-flag{font-size:16px;text-align:center}
.wht-title{font-size:11px;font-weight:bold;line-height:1.3;margin-bottom:3px}
.wht-meta{font-size:9px;color:#4a6070;display:flex;gap:8px;flex-wrap:wrap}
.wht-payout{color:#ffd700;font-size:9px}
.wht-right{text-align:right}
.wht-amt{font-size:18px;font-weight:bold}
.wht-amt.mil{color:#ff0080}.wht-amt.big{color:#00e5ff}.wht-amt.reg{color:#e0eaf0}
.wht-odds{font-size:10px;color:#4a6070;margin-top:2px}

/* WALLETS */
.wallet-card{background:#0e1318;border:1px solid #1a2530;margin-bottom:10px;padding:12px 14px}
.wc-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.wc-rank{font-size:16px;margin-right:8px}
.wc-name{font-size:12px;font-weight:bold;color:#e0eaf0}
.wc-addr{font-size:9px;color:#4a6070}
.wc-vol{font-size:18px;font-weight:bold;color:#00e5ff}
.wc-stats{display:flex;gap:14px;font-size:10px;color:#4a6070;margin-bottom:8px}.wc-stats b{color:#e0eaf0}
.wc-bets{border-top:1px solid #1a2530;padding-top:6px}
.wc-bet{font-size:9px;color:#4a6070;padding:2px 0;display:flex;justify-content:space-between}

::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:#080c10}::-webkit-scrollbar-thumb{background:#1a2530}
</style>
</head>
<body>
<div class="hdr">
  <div class="logo">WHALE<span>WATCH</span></div>
  <div class="hdr-right"><div class="dot" id="dot"></div><span id="last-update">—</span><span style="font-variant-numeric:tabular-nums" id="cd">60s</span></div>
</div>
<div class="tabs">
  <div class="tab active" onclick="go('mlb')">⚾ MLB <span class="badge" id="mlb-n"></span></div>
  <div class="tab" onclick="go('war')">🚨 WAR INTEL <span class="badge" id="war-n"></span></div>
  <div class="tab" onclick="go('whales')">🐳 ALL WHALES <span class="badge" id="whales-n"></span></div>
  <div class="tab" onclick="go('wallets')">🏆 WALLETS</div>
</div>
<div class="filter-bar">
  <div><div class="fb-label">MIN TRADE SIZE</div><div class="fb-val" id="min-val">$1.0K</div></div>
  <input type="range" id="min-slider" min="1000" max="900000" step="1000" value="1000" oninput="onSlider(this.value)">
  <div class="fb-info" id="fetch-info">—</div>
</div>
<div class="panel active" id="p-mlb"><div class="section" id="mlb-list"><div class="empty"><span class="spin"></span> Loading…</div></div></div>
<div class="panel" id="p-war"><div class="section" id="war-list"><div class="empty"><span class="spin"></span> Loading…</div></div></div>
<div class="panel" id="p-whales"><div class="section" id="whales-list"><div class="empty"><span class="spin"></span> Loading…</div></div></div>
<div class="panel" id="p-wallets"><div class="section" id="wallet-list"><div class="empty"><span class="spin"></span> Loading…</div></div></div>

<script>
const $=id=>document.getElementById(id);
const fmt=n=>n>=1e6?'$'+(n/1e6).toFixed(2)+'M':n>=1e3?'$'+(n/1e3).toFixed(1)+'K':'$'+Math.round(n);
const fmtFull=n=>n>=1e6?'$'+Math.round(n).toLocaleString():n>=1e3?'$'+Math.round(n).toLocaleString():'$'+Math.round(n);
const esc=s=>(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;');
const TABS=['mlb','war','whales','wallets'];
function go(t){TABS.forEach((x,i)=>{$('p-'+x).classList.toggle('active',x===t);document.querySelectorAll('.tab')[i].classList.toggle('active',x===t);});}

let countdown=60;
setInterval(()=>{countdown--;if(countdown<=0){countdown=60;refreshAll();}$('cd').textContent=countdown+'s';},1000);

function getMin(){return parseInt($('min-slider').value)||1000;}
function onSlider(v){$('min-val').textContent=fmt(parseInt(v));loadWar();loadWhales();}

async function refreshAll(){
  $('dot').classList.remove('live');
  await Promise.allSettled([loadMLB(),loadWar(),loadWhales(),loadWallets()]);
  $('dot').classList.add('live');
  $('last-update').textContent=new Date().toLocaleTimeString();
  countdown=60;
}

function tradeRow(t){
  const amtCls=t.usd>=50000?'huge':t.usd>=5000?'big':'reg';
  const ts=t.timestamp?new Date(t.timestamp*1000).toLocaleTimeString():'';
  const payStr=t.payout>0?` · 💰+${fmt(t.payout)}`:'';
  return`<div class="tr">
    <span class="tr-flag">${t.flag||'·'}</span>
    <div>
      <div class="tr-detail"><span class="${t.side==='BUY'?'buy':'sell'}">${t.side}</span> ${esc(t.outcome)} · ${esc(t.title).slice(0,40)}</div>
      <div class="tr-wallet">${esc(t.pseudonym||t.wallet)} · ${fmtFull(t.usd)} at ${(t.odds*100).toFixed(0)}¢ · ${ts}${payStr}</div>
    </div>
    <div class="tr-right"><div class="tr-amt ${amtCls}">${fmt(t.usd)}</div><div class="tr-sub">@${(t.odds*100).toFixed(0)}¢</div></div>
  </div>`;
}

// ── MLB ──────────────────────────────────────────────────────────────────────
async function loadMLB(){
  try{
    const r=await fetch('/api/mlb');const games=await r.json();
    if(games.error)throw new Error(games.error);
    $('mlb-n').textContent=games.length;
    if(!games.length){$('mlb-list').innerHTML='<div class="empty">No games today</div>';return;}
    const min=getMin();
    $('mlb-list').innerHTML=games.map((g,i)=>{
      const ml=g.moneyline;
      let barsHtml='<div style="font-size:9px;color:#253540;margin:6px 0">No odds (settled or outside 15-85% range)</div>';
      if(ml&&ml.prices.length>=2){
        const a=(ml.prices[0]*100).toFixed(1),h=(ml.prices[1]*100).toFixed(1);
        barsHtml=`<div class="ml-bar"><div class="ml-a" style="width:${a}%">${a}%</div><div class="ml-h" style="width:${h}%">${h}%</div></div>`;
      }
      const ouHtml=g.ou?`<div class="ou-pill">O/U <b>${g.ou.line}</b> · Over ${(g.ou.prices[0]*100).toFixed(0)}% / Under ${(g.ou.prices[1]*100).toFixed(0)}%</div>`:'';
      const sharpHtml=g.isSharp?`<span class="sharp">⚡ SHARP ${g.delta>0?'▲':'▼'}${Math.abs(g.delta*100).toFixed(1)}pp</span>`:'';
      const deltaHtml=!g.isSharp&&g.delta?`<span style="color:${g.delta>0?'#39ff14':'#ff3366'}">${g.delta>0?'▲':'▼'}${Math.abs(g.delta*100).toFixed(1)}pp</span>`:'';
      const mispHtml=g.mispriced?'<span class="misprice">⚠ MISPRICED?</span>':'';
      const time=new Date(g.gameTime).toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',timeZone:'America/New_York'})+' ET';
      const tid='gt-'+i;

      // Inline trades filtered by slider
      const filteredTrades=g.trades.filter(t=>t.usd>=min);
      const tradesHtml=filteredTrades.length
        ?filteredTrades.map(tradeRow).join('')
        :`<div style="font-size:9px;color:#4a6070;padding:8px;text-align:center">${g.trades.length} trades found but none >= ${fmt(min)} — lower slider to see</div>`;

      return`<div class="game" onclick="$('${tid}').classList.toggle('open')">
        <div class="game-top">
          <div class="game-teams">${esc(g.away)} <span style="color:#4a6070">@</span> ${esc(g.home)}</div>
          <div class="game-sub">${esc(g.awayRec)} vs ${esc(g.homeRec)} · ${time} · ${esc(g.status)}</div>
          <div class="pitchers">⚾ <b>${esc(g.awayPitcher)}</b> vs <b>${esc(g.homePitcher)}</b></div>
          ${barsHtml}${ouHtml}
          <div class="game-meta">
            ${g.vol24>0?`<span>24h: ${fmt(g.vol24)}</span>`:''}
            ${g.totalVol>0?`<span>Total: ${fmt(g.totalVol)}</span>`:''}
            ${sharpHtml}${deltaHtml}${mispHtml}
            <span>${g.tradeCount} trades</span>
          </div>
        </div>
        <div class="game-expand">▼ click for ${g.tradeCount} trades</div>
        <div class="game-trades" id="${tid}">${tradesHtml}</div>
      </div>`;
    }).join('');
  }catch(e){$('mlb-list').innerHTML=`<div class="empty">Error: ${esc(e.message)}</div>`;}
}

// ── WAR INTEL ────────────────────────────────────────────────────────────────
async function loadWar(){
  try{
    const min=getMin();
    const r=await fetch(`/api/war?min=${min}`);const data=await r.json();
    if(data.error)throw new Error(data.error);
    const markets=data.markets||[];const topWhales=data.topWhales||[];
    $('war-n').textContent=markets.length;
    $('fetch-info').textContent=`${(data.totalFetched||0).toLocaleString()} trades scanned`;
    if(!markets.length){$('war-list').innerHTML='<div class="empty">No war markets</div>';return;}

    let bannerHtml='';
    if(topWhales.length){
      bannerHtml=`<div class="whale-banner"><div class="wb-title">🚨 WHALE ALERTS — TRADES OVER ${fmt(Math.max(min,1000))}</div>
        ${topWhales.map(t=>`<div class="tr">
          <span class="tr-flag">${t.flag||'🎯'}</span>
          <div>
            <div class="tr-detail"><span class="${t.side==='BUY'?'buy':'sell'}">${t.side}</span> ${esc(t.outcome)} · ${esc(t.title).slice(0,40)}</div>
            <div class="tr-wallet">${esc(t.wallet)} · ${fmtFull(t.usd)} at ${(t.odds*100).toFixed(0)}¢</div>
          </div>
          <div class="tr-right"><div class="tr-amt huge">${fmt(t.usd)}</div></div>
        </div>`).join('')}
      </div>`;
    }

    $('war-list').innerHTML=bannerHtml+markets.map((m,i)=>{
      const pct=(m.yesPrice*100).toFixed(0),pctN=parseFloat(pct);
      const lvl=pctN>=40?'hi':pctN>=15?'mod':'lo';
      const cls=pctN>=40?'':pctN>=15?'mod':'low';
      const tc=m.trades.length;
      const mid='wm-'+i;
      const tradesHtml=tc?`<div class="wm-trades" id="${mid}">
        <div style="font-size:9px;color:#4a6070;letter-spacing:1px;margin-bottom:6px">TRADES (${tc}) — min ${fmt(min)}</div>
        ${m.trades.map(tradeRow).join('')}
      </div>`:'';

      return`<div class="war-market ${cls}" onclick="var e=$('${mid}');if(e)e.classList.toggle('open')">
        <div class="wm-hdr"><div class="wm-q">${esc(m.question)}</div><div class="wm-pct ${lvl}">${pct}%</div></div>
        <div class="wm-meta">
          <span>YES ${pct}% / NO ${(m.noPrice*100).toFixed(0)}%</span>
          <span>Vol: ${fmt(m.volume)}</span>
          ${m.volume24hr>0?`<span>24h: ${fmt(m.volume24hr)}</span>`:''}
          ${tc?`<span style="color:#ff6b35">${tc} trades</span>`:''}
        </div>
        ${tradesHtml}
        ${tc?`<div style="font-size:9px;color:#4a6070;margin-top:6px">▼ ${tc} trades — click to expand</div>`:''}
      </div>`;
    }).join('');
  }catch(e){$('war-list').innerHTML=`<div class="empty">Error: ${esc(e.message)}</div>`;}
}

// ── ALL WHALES ──────────────────────────────────────────────────────────────
async function loadWhales(){
  try{
    const min=getMin();
    const r=await fetch(`/api/allwhales?min=${min}`);const data=await r.json();
    if(data.error)throw new Error(data.error);
    const trades=data.trades||[];
    $('whales-n').textContent=trades.length;
    $('fetch-info').textContent=`${(data.totalFetched||0).toLocaleString()} trades scanned`;
    if(!trades.length){$('whales-list').innerHTML=`<div class="empty">No trades >= ${fmt(min)} in last 3000 trades — try lowering slider</div>`;return;}

    $('whales-list').innerHTML=trades.map(t=>{
      const cls=t.usd>=1e6?'mil':t.usd>=50000?'big':t.odds<=0.20?'long':'';
      const amtCls=t.usd>=1e6?'mil':t.usd>=50000?'big':'reg';
      const ts=t.timestamp?new Date(t.timestamp*1000).toLocaleTimeString():'';
      const payStr=t.payout>0?`<span class="wht-payout">💰 +${fmt(t.payout)} potential</span>`:'';
      return`<div class="whale-trade ${cls}">
        <div class="wht-flag">${t.flag||'·'}</div>
        <div>
          <div class="wht-title">${esc(t.title).slice(0,65)}</div>
          <div class="wht-meta">
            <span class="${t.side==='BUY'?'buy':'sell'}">${t.side}</span>
            <span>${esc(t.outcome)}</span>
            <span>${esc(t.pseudonym||t.wallet)}</span>
            <span>${fmtFull(t.usd)} at ${(t.odds*100).toFixed(0)}¢</span>
            <span>${ts}</span>
            ${payStr}
          </div>
        </div>
        <div class="wht-right"><div class="wht-amt ${amtCls}">${fmt(t.usd)}</div><div class="wht-odds">@${(t.odds*100).toFixed(0)}¢</div></div>
      </div>`;
    }).join('');
  }catch(e){$('whales-list').innerHTML=`<div class="empty">Error: ${esc(e.message)}</div>`;}
}

// ── WALLETS ──────────────────────────────────────────────────────────────────
async function loadWallets(){
  try{
    const r=await fetch('/api/wallets');const wallets=await r.json();
    if(wallets.error)throw new Error(wallets.error);
    const medals=['🥇','🥈','🥉'];
    if(!wallets.length){$('wallet-list').innerHTML='<div class="empty">No wallets</div>';return;}
    $('wallet-list').innerHTML=wallets.map((w,i)=>{
      const bp=w.trades>0?Math.round((w.buys/w.trades)*100):50;
      const bets=w.recentBets.map(b=>`<div class="wc-bet"><span><span class="${b.side==='BUY'?'buy':'sell'}">${b.side}</span> ${esc(b.outcome)} · ${esc(b.title)}</span><span>${fmt(b.usd)} @${(b.odds*100).toFixed(0)}¢</span></div>`).join('');
      return`<div class="wallet-card">
        <div class="wc-hdr"><div style="display:flex;align-items:center"><span class="wc-rank">${medals[i]||(i+1)}</span><div><div class="wc-name">${esc(w.pseudonym||w.short)}</div><div class="wc-addr">${w.address.slice(0,8)}…${w.address.slice(-6)}</div></div></div><div class="wc-vol">${fmt(w.volume)}</div></div>
        <div class="wc-stats"><span>Trades: <b>${w.trades}</b></span><span>Biggest: <b>${fmt(w.biggest)}</b></span><span>Buy: <b>${bp}%</b></span></div>
        ${bets?`<div class="wc-bets">${bets}</div>`:''}
      </div>`;
    }).join('');
  }catch(e){$('wallet-list').innerHTML=`<div class="empty">Error: ${esc(e.message)}</div>`;}
}

refreshAll();
</script>
</body>
</html>
